<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
    <!-- A-Frame -->
    <!--script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script-->
	<script src="./js/libs/aframe.min.js"></script>
    <!-- MindAR -->
    <!--script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script-->
	<script src="./js/libs/mindar-image-aframe.prod.js"></script>	

	<script src="./js/components/mindar-orientation-reset.js"></script>
	<script src="./js/components/base-indicator.js"></script>
	<script src="./js/components/target-star-link.js"></script>
	<script src="./js/components/audio-component.js"></script>
	<script src="./js/components/bridge-console-controller.js"></script>
	<script src="./js/components/star-geometry.js"></script>
	

	
  <link rel="stylesheet" href="../../libs/qr/qr-overlay.css">
    <style>
      body {
        margin: 0;
        background: black;
        overflow: hidden;
      }

      /* ===== PORTAL (AR VIEW) ===== */
      #portal {
        position: absolute;
        border: 10px solid #888;
        border-radius: 50%;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.9);
        z-index: 10;
      }

      #portal canvas {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover;
      }

      /* ===== HUD OVERLAY ===== */
      #hud {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: auto; /* allow AR interaction later */
      }
	
  .a-enter-vr-button {
    display: none !important;
  }

  #round-display {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-family: monospace;
    font-size: 20px;
    background: rgba(0,0,0,0.55);
    padding: 6px 18px;
    border-radius: 8px;
    pointer-events: none;
    z-index: 20;
  }

  /* ===== ENERGY GAUGE ===== */
  #energy-gauge {
    position: absolute;
    bottom: 24px;
    right: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
    z-index: 20;
  }
  #energy-label {
    color: #39ff14;
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-shadow: 0 0 8px #39ff14;
  }
  #energy-bar-track {
    width: 18px;
    height: 130px;
    border: 2px solid #39ff14;
    border-radius: 4px;
    background: rgba(0,0,0,0.55);
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    box-shadow: 0 0 12px rgba(57,255,20,0.4), inset 0 0 6px rgba(57,255,20,0.1);
  }
  #energy-bar-fill {
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #1a8c00, #39ff14);
    transition: height 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 0 14px rgba(57,255,20,0.9);
  }

    </style>
  </head>

  <body>

    <!-- ===== AR PORTAL ===== -->
    <div id="portal">
      <a-scene
        embedded
        mindar-image="imageTargetSrc: ./images/targets.mind;maxTrack: 4; filterMinCF: 0.0005;  filterBeta: 0.1; warmupTolerance: 2;   missTolerance: 3;uiScanning: false;"
        vr-mode-ui="enabled: false" style="pointer-events: none"
        device-orientation-permission-ui="enabled: true"> 
	  <a-entity mindar-image-target="targetIndex: 0" target-star-link="starId: m1">
        <a-text value="A" align="center" color="#FF0000" width="25" position="0 0 0.1"></a-text>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 1" target-star-link="starId: m2">
        <a-text value="B" align="center" color="#00FF00" width="25" position="0 0 0.1"></a-text>
      </a-entity>
	  <a-entity mindar-image-target="targetIndex: 2" target-star-link="starId: m3">
        <a-text value="C" align="center" color="#FF00FF" width="25" position="0 0 0.1"></a-text>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 3" target-star-link="starId: m4">
        <a-text value="D" align="center" color="#00FFFF" width="25" position="0 0 0.1"></a-text>
      </a-entity>
        <a-camera mindar-orientation-reset look-controls="enabled: false"></a-camera>
      </a-scene>
    </div>

    <!-- ===== ROUND DISPLAY ===== -->
    <div id="round-display">Round 1 / 5</div>

    <!-- ===== ENERGY GAUGE ===== -->
    <div id="energy-gauge">
      <div id="energy-label">FUEL</div>
      <div id="energy-bar-track">
        <div id="energy-bar-fill"></div>
      </div>
    </div>

    <!-- ===== HUD / CONSOLE ===== -->
    <div id="hud">
      <a-scene id="hud-scene" embedded  renderer="alpha: true" >
		<a-assets>
			<a-asset-item id="spaceship-interior" src="./models/soma04_spaceship_low_poly_-_interior.glb"></a-asset-item>
			<a-asset-item id="lumen-hologram" src="./models/lumen_hologram_table.glb"></a-asset-item>
			<a-asset-item id="glowing-star" src="./models/glowing_star.glb"></a-asset-item>
		    <a-mixin
				id="star-base"
				animation__spin="
				  property: rotation;
				  to: 360 360 0; dur: 4000; easing: linear; loop: true; autoplay: false;
				  startEvents: spin-start; pauseEvents: spin-stop; resumeEvents: spin-resume;">
			</a-mixin>
			<a-mixin
				id="base-cylinder"
				geometry="primitive: cylinder; radius: 0.12; height: 0.05"
				material="color: #333"
				base-indicator>
			</a-mixin>
			 <audio id="xr_click_sfx" src="./audio/xr_click.wav" preload="auto"></audio>
		</a-assets>
		<a-entity id="game-controller" bridge-console-controller></a-entity>
		<a-entity
		  id="xr-click-player"
		  sound="src: #xr_click_sfx; poolSize: 4; volume: 1.0">
		</a-entity>
        <a-entity id="camera-rig">
          <a-camera position="0 0 0" rotation="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false" camera="active: true">
            <a-cursor
              rayOrigin="mouse"
              raycaster="objects: .clickable"
              cursor="rayOrigin: mouse">
            </a-cursor>
          </a-camera>
        </a-entity>

<!-- Lumen hologram table — behind the user -->
			<a-entity
				id="lumen-hologram-model"
				gltf-model="#lumen-hologram"
				position="-2.7 -0.5 0"
				scale="1 1 1"
				rotation="0 180 15">
				<!-- Progress stars — neon green to match energy bar -->
				<a-entity id="pm1" gltf-model="#glowing-star" rotation="-90 90 0" position="0 0.60 -0.70" scale="0 0 0"></a-entity>
				<a-entity id="pm2" gltf-model="#glowing-star" rotation="-90 90 0" position="0 0.60 -0.35" scale="0 0 0"></a-entity>
				<a-entity id="pm3" gltf-model="#glowing-star" rotation="-90 90 0" position="0 0.60  0.00" scale="0 0 0"></a-entity>
				<a-entity id="pm4" gltf-model="#glowing-star" rotation="-90 90 0" position="0 0.60  0.35" scale="0 0 0"></a-entity>
				<a-entity id="pm5" gltf-model="#glowing-star" rotation="-90 90 0" position="0 0.60  0.70" scale="0 0 0"></a-entity>
			</a-entity>

<!-- Marker at the spaceship window's world position — projected to screen each frame to move the portal -->
			<a-entity id="window-marker" position="0 0.12 -5" visible="false"></a-entity>

<!-- SPACESHIP INTERIOR — adjust scale/position/rotation until it surrounds the camera correctly -->
			<a-entity
				id="spaceship-model"
				gltf-model="#spaceship-interior"
				position="0 -60 0"
				scale="0.1 0.1 0.1"
				rotation="0 0 0">
			</a-entity>

<!-- UPPER SLAB -->
			<a-box position="0 -1.1 -5.0" depth="1.0" width="8" height="0.05" color="#666">
			 <a-entity id="upper-collection">
				<a-entity id="m1" mixin="star-base" gltf-model="#glowing-star" scale="0.25 0.25 0.25" rotation="-90 0 0" position="-1.5 0.3 0" model-color="color: #8fec43"></a-entity>
				<a-entity id="m2" mixin="star-base" gltf-model="#glowing-star" scale="0.25 0.25 0.25" rotation="-90 0 0" position="-0.5 0.3 0" model-color="color: #36bdab"></a-entity>
				<a-entity id="m3" mixin="star-base" gltf-model="#glowing-star" scale="0.25 0.25 0.25" rotation="-90 0 0" position=" 0.5 0.3 0" model-color="color: #ff9448"></a-entity>
				<a-entity id="m4" mixin="star-base" gltf-model="#glowing-star" scale="0.25 0.25 0.25" rotation="-90 0 0" position=" 1.5 0.3 0" model-color="color: #ec4376"></a-entity>
				<a-entity id="m1b" mixin="base-cylinder" geometry="primitive: cylinder; radius: 0.25; height: 0.1" position="-1.5 0.05 0"></a-entity>
				<a-entity id="m2b" mixin="base-cylinder" geometry="primitive: cylinder; radius: 0.25; height: 0.1" position="-0.5 0.05 0"></a-entity>
				<a-entity id="m3b" mixin="base-cylinder" geometry="primitive: cylinder; radius: 0.25; height: 0.1" position=" 0.5 0.05 0"></a-entity>
				<a-entity id="m4b" mixin="base-cylinder" geometry="primitive: cylinder; radius: 0.25; height: 0.1" position=" 1.5 0.05 0"></a-entity>
			 </a-entity>
			</a-box>
			
				

			<!-- LOWER SLAB (closer to camera) -->
			<!--
			<a-box position="0 -1.2 -3.0" depth="0.6" width="6" height="0.05" color="#888">
				<a-entity id="m5b" mixin="base-cylinder" geometry="primitive: cylinder; radius: 0.25; height: 0.1" position="-2.0 0.05 0"></a-entity>
				<a-entity id="m6b" mixin="base-cylinder" geometry="primitive: cylinder; radius: 0.25; height: 0.1" position="-1.0 0.05 0"></a-entity>
				<a-entity id="m7b" mixin="base-cylinder" geometry="primitive: cylinder; radius: 0.25; height: 0.1" position=" 0.0 0.05 0"></a-entity>
				<a-entity id="m8b" mixin="base-cylinder" geometry="primitive: cylinder; radius: 0.25; height: 0.1" position=" 1.0 0.05 0"></a-entity>
				<a-entity id="m9b" mixin="base-cylinder" geometry="primitive: cylinder; radius: 0.25; height: 0.1" position=" 2.0 0.05 0"></a-entity>
				<a-entity id="m5" class="lower-star clickable" mixin="star-base" geometry="primitive: sphere; radius: 0.25" position="-2.0 0.3 0" material="src: ./images/marble-swirl.png; metalness: 0.2; roughness: 0.4; color: #FF4D4D"></a-entity>
				<a-entity id="m6" class="lower-star clickable" mixin="star-base" geometry="primitive: sphere; radius: 0.25" position="-1.0 0.3 0" material="src: ./images/marble-swirl.png; metalness: 0.2; roughness: 0.4; color: #4DFF88"></a-entity>
				<a-entity id="m7" class="lower-star clickable" mixin="star-base" geometry="primitive: sphere; radius: 0.25" position=" 0.0 0.3 0" material="src: ./images/marble-swirl.png; metalness: 0.2; roughness: 0.4; color: #4DA6FF"></a-entity>
				<a-entity id="m8" class="lower-star clickable" mixin="star-base" geometry="primitive: sphere; radius: 0.25" position=" 1.0 0.3 0" material="src: ./images/marble-swirl.png; metalness: 0.2; roughness: 0.4; color: #FFD24D"></a-entity>
				<a-entity id="m9" class="lower-star clickable" mixin="star-base" geometry="primitive: sphere; radius: 0.25" position=" 2.0 0.3 0" material="src: ./images/marble-swirl.png; metalness: 0.2; roughness: 0.4; color: #B84DFF"></a-entity>
			</a-box>
			-->
      </a-scene>
	  <script>
// Position the portal at a fixed home position, recalculated on orientation change
(function () {
  const hudScene = document.querySelector('#hud-scene');
  const portal = document.getElementById('portal');

  // Fractions of viewport — tweak these to reposition the portal
  const HOME_X = 0.49;
  const HOME_Y_VH = 0.35;

  function placePortal() {
    const W = window.innerWidth, H = window.innerHeight;
    const portrait = H > W;
    // Larger in portrait so it fills the narrower screen sensibly
    const size = portrait ? W * 0.7 : Math.min(W, H) * 0.33;

    portal.style.width  = size + 'px';
    portal.style.height = size + 'px';
    portal.style.left   = (HOME_X * W - size / 2) + 'px';
    portal.style.top    = (HOME_Y_VH * H - size / 2) + 'px';
    portal.style.display = 'block';
  }

  // Size the portal immediately so MindAR initialises with correct canvas dimensions
  placePortal();

  hudScene.addEventListener('loaded', () => {
    portal.style.transform = '';
    // Reload on orientation change so MindAR reinitialises the camera stream cleanly
    window.addEventListener('orientationchange', () => setTimeout(() => location.reload(), 400));
    window.addEventListener('resize', placePortal);
  });
})();

document.querySelector('#spaceship-model').addEventListener('model-loaded', function () {
  const mesh = this.getObject3D('mesh');
  if (!mesh) return;
  mesh.traverse(node => {
    if (node.isMesh) {
      const mats = Array.isArray(node.material) ? node.material : [node.material];
      mats.forEach(m => { m.side = THREE.DoubleSide; m.needsUpdate = true; });
    }
  });
});

document.querySelector('a-scene#hud-scene').addEventListener('loaded', () => {
  const cursor = document.querySelector('a-cursor');

  // 🔥 Force raycaster to use correct canvas
  const canvas = document.querySelector('#hud canvas');

  cursor.components.raycaster.el.sceneEl.canvas = canvas;

  cursor.components.raycaster.refreshObjects();

  console.log('Mouse raycaster rebound to HUD canvas');
});

const audioEntity = AudioComponentFactory.create({
  sources: [
    './audio/idoberg-ambient-pads-loop-296968.mp3',	// index 0 → ambient
    './audio/xr_click.wav',							// index 1/0 → user click on sphere.
    './audio/chrisiex1-correct-156911.mp3',    		// index 2/1 → found notification
	'./audio/material-buy-success-394517.mp3'		// index 3/2→ success notification
  ]
});

document.querySelector('a-scene#hud-scene').appendChild(audioEntity);


</script>
    </div>
  <script src="../../libs/qr/qr-overlay.js"></script>
  </body>
</html>
