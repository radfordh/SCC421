
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: .\targets.mind; maxTrack: 4; filterMinCF: 0.0005;  filterBeta: 0.1; warmupTolerance: 2;   missTolerance: 3;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true"
>
      <a-assets>
        <a-asset-item id="bearModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/band-example/bear/scene.gltf"></a-asset-item>
        <a-asset-item id="raccoonModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/band-example/raccoon/scene.gltf"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-text
          value="A"
          align="center"
          color="#FF0000"
          width="25"
          position="0 0 0.1"
        ></a-text>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 1">
        <a-text
          value="B"
          align="center"
          color="#00FF00"
          width="25"
          position="0 0 0.1"
        ></a-text>
      </a-entity>
	  <a-entity mindar-image-target="targetIndex: 2">
        <a-text
          value="C"
          align="center"
          color="#FF00FF"
          width="25"
          position="0 0 0.1"
        ></a-text>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 3">
        <a-text
          value="D"
          align="center"
          color="#00FFFF"
          width="25"
          position="0 0 0.1"
        ></a-text>
      </a-entity>
    </a-scene>
  </body>
</html>
